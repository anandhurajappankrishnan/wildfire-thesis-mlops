# =============================================================================
# Wildfire Thesis MLOps — central configuration
# =============================================================================
# Edit dates, regions (study_areas.geojson), GEE sampling, and model params here.
# Secrets (EE_PROJECT_ID, GEMINI_API_KEY) belong in .env — not in this file.

project:
  name: "wildfire-thesis-mlops"
  seed: 42

data:
  # Fire seasons to extract (recent years recommended)
  start_date: "2023-06-01"
  end_date: "2024-10-31"
  prediction_horizon_days: 7
  aoi_geojson_path: "config/study_areas.geojson"
  gee_scale_meters: 500
  study_area_name: "multi_country"
  temporal_granularity: "weekly"
  sampling_strategy: "grid_aggregation_500m"
  ee_collections:
    ndvi_evi: "MODIS/061/MOD13A1"
    burned_area: "MODIS/061/MCD64A1"
    era5_land: "ECMWF/ERA5_LAND/DAILY_AGGR"

  gee:
    temporal_stride_days: 7          # one sample every N days
    positive_points_per_region: 100  # stratified samples on FIRMS fire mask
    background_points_per_region: 300  # uniform random negatives across AOI
    grid_points_per_region: 200      # legacy fallback if pos/bg not set
    max_dates: null                  # null = all dates in range; set int to cap
    tile_scale: 4                    # GEE reduceRegions tile scale
    ee_project_env: "EE_PROJECT_ID"  # env var name for GEE project id

paths:
  data_dir: "data"
  raw_dir: "data/raw"
  bronze_dir: "data/bronze"
  silver_dir: "data/silver"
  gold_dir: "data/gold"
  outputs_dir: "outputs"
  figures_dir: "outputs/figures"
  tables_dir: "outputs/tables"
  reports_dir: "outputs/reports"
  figure_format: "pdf"               # thesis figures: pdf | svg | png

database:
  driver: "ODBC Driver 17 for SQL Server"
  server: "localhost"
  database: "WildfireThesis"
  trusted_connection: "yes"
  schema: "dbo"

model:
  test_size: 0.25                    # chronological hold-out fraction
  val_frac: 0.15                     # tail of train used for threshold tuning
  cv_folds: 5                        # TimeSeriesSplit folds for mean ± std metrics
  lr_max_iter: 2000
  rf_n_estimators: 250
  xgb_n_estimators: 250
  xgb_learning_rate: 0.06
  xgb_max_depth: 6

pipeline:
  skip_gee_if_raw_exists: true       # default: quick mode when raw CSV exists
